name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
      has_plugins: ${{ steps.list.outputs.has_plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          shopt -s nullglob
          dirs=(plugins/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "plugins=[]" >> "$GITHUB_OUTPUT"
            echo "has_plugins=false" >> "$GITHUB_OUTPUT"
          else
            plugins=$(printf '%s\n' "${dirs[@]}" | sed 's|plugins/||;s|/||' | jq -R . | jq -s -c .)
            echo "plugins=$plugins" >> "$GITHUB_OUTPUT"
            echo "has_plugins=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: discover
    if: needs.discover.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Release ${{ matrix.plugin }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PLUGIN: ${{ matrix.plugin }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: pnpm exec semantic-release
